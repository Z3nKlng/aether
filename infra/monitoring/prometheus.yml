global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'aether-api'
    static_configs:
      - targets: ['api-service:3000']

  - job_name: 'aether-realtime'
    static_configs:
      - targets: ['realtime-service:3001']

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
