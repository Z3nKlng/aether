apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aether-service
  template:
    metadata:
      labels:
        app: aether-service
    spec:
      containers:
      - name: app
        image: aether-api:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: aether-config
        - secretRef:
            name: aether-secrets
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aether-service
spec:
  selector:
    app: aether-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
