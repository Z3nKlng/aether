apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: aether/web:latest
        ports:
        - containerPort: 3000
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: aether-web
spec:
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 3000
