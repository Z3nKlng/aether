apiVersion: apps/v1
kind: Deployment
metadata:
  name: aether-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: aether/api:latest
        ports:
        - containerPort: 4000
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: aether-api
spec:
  selector:
    app: api
  ports:
  - port: 4000
    targetPort: 4000
