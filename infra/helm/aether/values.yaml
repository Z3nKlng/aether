# Default values for aether.
# This is a YAML-formatted file.

global:
  domain: aether-app.io
  environment: production

api:
  enabled: true
  replicaCount: 2
  image:
    repository: aether/api
    tag: latest
  service:
    port: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  hpa:
    minReplicas: 2
    maxReplicas: 10

web:
  enabled: true
  replicaCount: 2
  image:
    repository: aether/web
    tag: latest
  service:
    port: 3000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  hpa:
    minReplicas: 2
    maxReplicas: 10

realtime:
  enabled: true
  replicaCount: 2
  image:
    repository: aether/realtime
    tag: latest
  service:
    port: 3001
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  hpa:
    minReplicas: 2
    maxReplicas: 10

agentWorker:
  enabled: true
  replicaCount: 2
  image:
    repository: aether/agent-worker
    tag: latest
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
  tls:
    - secretName: aether-tls
      hosts:
        - aether-app.io
        - api.aether-app.io
