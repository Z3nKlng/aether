services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.alpine
      args:
        APP_NAME: api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://aether:aether@db:5432/aether
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.alpine
      args:
        APP_NAME: web
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3000

  realtime:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.alpine
      args:
        APP_NAME: realtime
    ports:
      - "3002:3001"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=aether
      - POSTGRES_PASSWORD=aether
      - POSTGRES_DB=aether
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=aether
      - CLICKHOUSE_USER=aether
      - CLICKHOUSE_PASSWORD=aether
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  postgres_data:
  clickhouse_data:
