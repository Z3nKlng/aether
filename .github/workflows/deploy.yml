name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web, realtime, agent-worker]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          
      - name: Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-deploy-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-deploy-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/Dockerfile.alpine
          build-args: |
            APP_NAME=${{ matrix.app }}
          push: true
          tags: aether/${{ matrix.app }}:latest,aether/${{ matrix.app }}:${{ github.sha }}

      - name: Update K8s deployment
        run: |
          # Use helm upgrade or kubectl set image
          # helm upgrade --install aether-${{ matrix.app }} infra/helm/aether --set ${{ matrix.app }}.image.tag=${{ github.sha }}
          echo "Deploying ${{ matrix.app }} version ${{ github.sha }}"
